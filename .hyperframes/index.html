<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Cartesiano - Gameplay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Space+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      font-family: 'Inter', sans-serif;
    }
    
    [data-composition-id="root"] {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: #0f172a;
      overflow: hidden;
    }
    
    /* ===== BACKGROUND ===== */
    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 500px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(34, 211, 238, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    
    /* ===== TITLE ===== */
    .game-title {
      position: absolute;
      top: 30px;
      left: 50%;
      margin-left: -180px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 42px;
      color: #e2e8f0;
      letter-spacing: 0.08em;
    }
    
    .game-title span {
      color: #22d3ee;
    }
    
    /* ===== TARGET PANEL (TOP LEFT-CENTER) ===== */
    .target-panel {
      position: absolute;
      top: 50px;
      left: 350px;
      margin-left: 0;
      width: 260px;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.98) 0%, rgba(15, 23, 42, 0.98) 100%);
      border: 2px solid #f87171;
      border-radius: 16px;
      padding: 12px 24px;
      text-align: center;
      box-shadow: 0 0 30px rgba(248, 113, 113, 0.2);
    }
    
    .target-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      display: inline-block;
      margin-right: 12px;
    }
    
    .target-coord {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 38px;
      color: #f87171;
      display: inline-block;
      text-shadow: 0 0 20px rgba(248, 113, 113, 0.5);
    }
    
    /* ===== TIMER (TOP RIGHT) ===== */
    .timer-panel {
      position: absolute;
      top: 50px;
      right: 60px;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
    }
    
    .timer-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    
    .timer {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 38px;
      color: #22d3ee;
      margin-top: 4px;
      text-shadow: 0 0 18px rgba(34, 211, 238, 0.5);
    }
    
    .timer.urgent {
      color: #f87171;
      text-shadow: 0 0 18px rgba(248, 113, 113, 0.5);
      animation: timer-pulse 0.6s ease-in-out infinite;
    }
    
    @keyframes timer-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.02); }
    }
    
    /* ===== RANKING (LEFT TOP) ===== */
    .ranking-panel {
      position: absolute;
      top: 40px;
      left: 30px;
      margin-top: 0;
      width: 230px;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px 20px;
    }
    
    .ranking-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #334155;
    }
    
    .ranking-title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      color: #e2e8f0;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    
    .ranking-row {
      display: flex;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(51, 65, 85, 0.3);
    }
    
    .ranking-row:last-child { border-bottom: none; }
    
    .rank-num {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 18px;
      width: 26px;
    }
    
    .rank-num.gold { color: #fbbf24; text-shadow: 0 0 8px rgba(251, 191, 36, 0.6); }
    .rank-num.silver { color: #94a3b8; }
    .rank-num.bronze { color: #f97316; }
    
    .rank-player {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: #e2e8f0;
    }
    
    .rank-score {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 16px;
      color: #a3e635;
      min-width: 55px;
      text-align: right;
    }
    
    /* ===== PLANO CARTESIANO ===== */
    .cartesian-board {
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 520px;
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border-radius: 16px;
      border: 1px solid #334155;
      box-shadow: 
        0 0 50px rgba(34, 211, 238, 0.12),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }
    
    .grid-container {
      position: absolute;
      top: 44px;
      left: 44px;
      right: 44px;
      bottom: 44px;
    }
    
    .grid-cell {
      position: absolute;
      background: rgba(51, 65, 85, 0.25);
      border: 1px solid rgba(51, 65, 85, 0.4);
    }
    
    .axis-main {
      position: absolute;
      background: #64748b;
    }
    
    .axis-x {
      height: 3px;
      left: 0;
      right: 0;
      top: 50%;
      box-shadow: 0 0 12px rgba(100, 116, 139, 0.5);
    }
    
    .axis-y {
      width: 3px;
      top: 0;
      bottom: 0;
      left: 50%;
      box-shadow: 0 0 12px rgba(100, 116, 139, 0.5);
    }
    
    .axis-label {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 16px;
      color: #e2e8f0;
    }
    
    .axis-label.x-label { right: -26px; top: calc(50% - 12px); }
    .axis-label.y-label { left: calc(50% + 12px); top: -30px; }
    
    /* Player dots */
    .player-dot {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    
    .player-dot::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    
    .player-dot::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border-radius: 50%;
      border: 2px solid currentColor;
      opacity: 0.4;
    }
    
    .player-dot.p1 { background: #22d3ee; color: #22d3ee; box-shadow: 0 0 20px rgba(34, 211, 238, 0.8); }
    .player-dot.p2 { background: #f472b6; color: #f472b6; box-shadow: 0 0 20px rgba(244, 114, 182, 0.8); }
    .player-dot.p3 { background: #a3e635; color: #a3e635; box-shadow: 0 0 20px rgba(163, 230, 53, 0.8); }
    .player-dot.p4 { background: #fbbf24; color: #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.8); }
    
    /* Target marker */
    .target-marker {
      position: absolute;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%);
      z-index: 5;
    }
    
    .target-marker::before,
    .target-marker::after {
      content: '';
      position: absolute;
      background: #f87171;
    }
    
    .target-marker::before {
      width: 4px;
      height: 40px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 20px rgba(248, 113, 113, 0.9);
    }
    
    .target-marker::after {
      width: 40px;
      height: 4px;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 20px rgba(248, 113, 113, 0.9);
    }
    
    /* ===== POPUPS ===== */
    .popup {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 26px;
      pointer-events: none;
      z-index: 100;
    }
    
    .popup.fastest { color: #22d3ee; text-shadow: 0 0 20px rgba(34, 211, 238, 0.9); }
    .popup.second { color: #a3e635; text-shadow: 0 0 20px rgba(163, 230, 53, 0.9); }
    .popup.third { color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 0.9); }
    .popup.fourth { color: #94a3b8; text-shadow: 0 0 15px rgba(148, 163, 184, 0.5); }
    .popup.winner { color: #fbbf24; font-size: 48px; text-shadow: 0 0 40px rgba(251, 191, 36, 1); }
    .popup.champion { font-size: 34px; }
  </style>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="1920" data-height="1080" data-start="0">
    <div class="bg-glow"></div>
    
    <!-- Title -->
    <div class="game-title">GAME <span>CARTESIANO</span></div>
    
    <!-- Timer (TOP RIGHT) -->
    <div class="timer-panel">
      <div class="timer-label">Tiempo</div>
      <div class="timer" id="timer">10s</div>
    </div>
    
    <!-- Target Panel (TOP CENTER) -->
    <div class="target-panel">
      <div class="target-label">TARGET</div>
      <div class="target-coord" id="target-coord">(2, 1)</div>
    </div>
    
    <!-- Ranking (LEFT CENTER) -->
    <div class="ranking-panel">
      <div class="ranking-header">
        <div class="ranking-title">🏆 RANKING</div>
      </div>
      <div class="ranking-row">
        <span class="rank-num gold">1</span>
        <span class="rank-player">Player_01</span>
        <span class="rank-score" id="score-1">0</span>
      </div>
      <div class="ranking-row">
        <span class="rank-num silver">2</span>
        <span class="rank-player">Player_02</span>
        <span class="rank-score" id="score-2">0</span>
      </div>
      <div class="ranking-row">
        <span class="rank-num bronze">3</span>
        <span class="rank-player">Player_03</span>
        <span class="rank-score" id="score-3">0</span>
      </div>
      <div class="ranking-row">
        <span class="rank-num">4</span>
        <span class="rank-player">Player_04</span>
        <span class="rank-score" id="score-4">0</span>
      </div>
    </div>
    
    <!-- Cartesian Board (CENTER) -->
    <div class="cartesian-board" id="board">
      <div class="grid-container" id="grid-cells"></div>
      <div class="axis-main axis-x"></div>
      <div class="axis-main axis-y"></div>
      <div class="axis-label x-label">X</div>
      <div class="axis-label y-label">Y</div>
      
      <!-- Players -->
      <div class="player-dot p1" id="p1"></div>
      <div class="player-dot p2" id="p2"></div>
      <div class="player-dot p3" id="p3"></div>
      <div class="player-dot p4" id="p4"></div>
      
      <!-- Target -->
      <div class="target-marker" id="target-marker"></div>
    </div>
    
    <!-- Popups container -->
    <div id="popups"></div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    
    // ===== GENERATE GRID =====
    const gridContainer = document.getElementById('grid-cells');
    const usableSize = 424;
    const cellSize = usableSize / 10;
    
    for (let row = 0; row < 10; row++) {
      for (let col = 0; col < 10; col++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.style.width = `${cellSize - 1}px`;
        cell.style.height = `${cellSize - 1}px`;
        cell.style.left = `${col * cellSize + 1}px`;
        cell.style.top = `${row * cellSize + 1}px`;
        cell.style.opacity = '0';
        gridContainer.appendChild(cell);
      }
    }
    
    // ===== COORD TO POS =====
    function coordToPos(x, y) {
      const margin = 44;
      const cellSize = usableSize / 10;
      const centerX = margin + usableSize / 2;
      const centerY = margin + usableSize / 2;
      return {
        left: centerX + x * cellSize,
        top: centerY - y * cellSize
      };
    }
    
    // ===== SET INITIAL POSITIONS =====
    const initialPositions = [
      { id: 'p1', x: -3, y: 2 },
      { id: 'p2', x: 1, y: -3 },
      { id: 'p3', x: -2, y: -2 },
      { id: 'p4', x: 3, y: 0 },
    ];
    
    initialPositions.forEach(p => {
      const el = document.getElementById(p.id);
      const pos = coordToPos(p.x, p.y);
      el.style.left = `${pos.left}px`;
      el.style.top = `${pos.top}px`;
      el.style.opacity = '0';
      el.style.transform = 'translate(-50%, -50%) scale(0)';
    });
    
    // Target position
    const targetPos = coordToPos(2, 1);
    const targetMarker = document.getElementById('target-marker');
    targetMarker.style.left = `${targetPos.left}px`;
    targetMarker.style.top = `${targetPos.top}px`;
    targetMarker.style.opacity = '0';
    
    // ===== SCORES =====
    let scores = [0, 0, 0, 0];
    const scoreEls = [
      document.getElementById('score-1'),
      document.getElementById('score-2'),
      document.getElementById('score-3'),
      document.getElementById('score-4')
    ];
    
    function updateScores() {
      scoreEls.forEach((el, i) => {
        el.textContent = scores[i] > 0 ? `+${scores[i]}` : '0';
      });
    }
    
    // ===== POPUP SYSTEM =====
    function showPopup(text, type, x, y, time) {
      const container = document.getElementById('popups');
      const popup = document.createElement('div');
      popup.className = `popup ${type}`;
      popup.textContent = text;
      popup.style.left = `${x}px`;
      popup.style.top = `${y}px`;
      popup.style.opacity = '0';
      popup.style.transform = 'translate(-50%, -50%) scale(0.5)';
      container.appendChild(popup);
      
      tl.to(popup, {
        opacity: 1,
        scale: 1,
        duration: 0.35,
        ease: 'back.out(2)'
      }, time);
      
      tl.to(popup, {
        y: -60,
        opacity: 0,
        duration: 0.6,
        ease: 'power2.in'
      }, time + 1.0);
    }
    
    // ===== TIMELINE =====
    const tl = gsap.timeline({ paused: true });
    
    // ===== SCENE 1: INIT (0-3s) =====
    tl.from('.game-title', { y: -40, opacity: 0, duration: 0.7, ease: 'power3.out' }, 0.2);
    tl.from('.timer-panel', { x: 60, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0.3);
    tl.from('.target-panel', { y: -40, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0.4);
    tl.from('.ranking-panel', { x: -60, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0.5);
    tl.from('.cartesian-board', { scale: 0.7, opacity: 0, duration: 0.9, ease: 'back.out(1.4)' }, 0.7);
    tl.from('.grid-cell', { scale: 0, opacity: 0, duration: 0.3, stagger: 0.015, ease: 'power2.out' }, 1.3);
    tl.from('.axis-main', { scaleX: 0, scaleY: 0, duration: 0.4, ease: 'power2.out' }, 1.7);
    tl.from('.axis-label', { opacity: 0, duration: 0.3, ease: 'power2.out' }, 2.0);
    tl.to(targetMarker, { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(2)' }, 2.3);
    tl.from('#target-coord', { scale: 0.5, duration: 0.4, ease: 'back.out(2)' }, 2.6);
    tl.to('.player-dot', { opacity: 1, scale: 1, duration: 0.4, stagger: 0.12, ease: 'back.out(2)' }, 2.9);
    
    // ===== ROUND: ALL ARRIVE SEQUENTIALLY =====
    const target1 = { x: 2, y: 1 };
    const pos1 = coordToPos(target1.x, target1.y);
    
    // Timer countdown in background
    tl.to('#timer', { scale: 1.1, duration: 0.15, ease: 'power1.out' }, 3.0);
    tl.to('#timer', { scale: 1, duration: 0.15, ease: 'power1.in' }, 3.15);
    
    // P1 starts and arrives FIRST
    tl.to('#p1', { 
      left: `${pos1.left}px`, 
      top: `${pos1.top}px`, 
      duration: 0.8, 
      ease: 'power2.inOut' 
    }, 3.5);
    
    // Timer shows 8
    tl.call(() => { document.getElementById('timer').textContent = '8s'; }, null, 3.5);
    
    // P1 ARRIVES
    tl.to('#timer', { scale: 1.1, duration: 0.15, ease: 'power1.out' }, 4.0);
    tl.to('#timer', { scale: 1, duration: 0.15, ease: 'power1.in' }, 4.15);
    tl.to('#p1', { scale: 1.5, duration: 0.15, ease: 'power1.out', overwrite: 'auto' }, 4.3);
    tl.to('#p1', { scale: 1, duration: 0.15, ease: 'power1.in' }, 4.45);
    tl.call(() => { scores[0] += 100; updateScores(); }, null, 4.3);
    tl.call(() => showPopup('+100', 'fastest', 960, 500, 4.4), null, 4.4);
    tl.call(() => showPopup('¡1°!', 'fastest', 960, 450, 4.1), null, 4.1);
    
    // Timer shows 6
    tl.call(() => { document.getElementById('timer').textContent = '6s'; }, null, 4.3);
    
    // P2 starts AFTER P1 arrives
    tl.to('#p2', { 
      left: `${pos1.left}px`, 
      top: `${pos1.top}px`, 
      duration: 0.7, 
      ease: 'power2.inOut' 
    }, 4.6);
    
    // Timer shows 5
    tl.call(() => { document.getElementById('timer').textContent = '5s'; }, null, 4.8);
    
    // P2 ARRIVES
    tl.to('#p2', { scale: 1.3, duration: 0.15, ease: 'power1.out', overwrite: 'auto' }, 5.3);
    tl.to('#p2', { scale: 1, duration: 0.15, ease: 'power1.in' }, 5.45);
    tl.call(() => { scores[1] += 70; updateScores(); }, null, 5.3);
    tl.call(() => showPopup('+70', 'second', 820, 500, 5.4), null, 5.4);
    tl.call(() => showPopup('¡2°!', 'second', 820, 450, 5.1), null, 5.1);
    
    // Timer shows 3
    tl.call(() => { document.getElementById('timer').textContent = '3s'; }, null, 5.3);
    
    // P3 starts AFTER P2 arrives
    tl.to('#p3', { 
      left: `${pos1.left}px`, 
      top: `${pos1.top}px`, 
      duration: 0.6, 
      ease: 'power2.inOut' 
    }, 5.6);
    
    // Timer shows 2
    tl.call(() => { document.getElementById('timer').textContent = '2s'; }, null, 5.8);
    
    // P3 ARRIVES
    tl.call(() => { scores[2] += 40; updateScores(); }, null, 6.2);
    tl.call(() => showPopup('+40', 'third', 1100, 500, 6.3), null, 6.3);
    tl.call(() => showPopup('¡3°!', 'third', 1100, 450, 6.0), null, 6.0);
    
    // Timer shows 1
    tl.call(() => { document.getElementById('timer').textContent = '1s'; }, null, 6.2);
    
    // P4 starts AFTER P3 arrives
    tl.to('#p4', { 
      left: `${pos1.left}px`, 
      top: `${pos1.top}px`, 
      duration: 0.5, 
      ease: 'power2.inOut' 
    }, 6.5);
    
    // Timer shows 0 - urgent!
    tl.call(() => { 
      document.getElementById('timer').textContent = '0s'; 
      document.getElementById('timer').classList.add('urgent');
    }, null, 6.7);
    
    // P4 ARRIVES
    tl.call(() => { scores[3] += 10; updateScores(); }, null, 7.0);
    tl.call(() => showPopup('+10', 'fourth', 1200, 500, 7.1), null, 7.1);
    tl.call(() => showPopup('¡4°!', 'fourth', 1200, 450, 6.8), null, 6.8);
    
    // ===== WINNER =====
    tl.to('#p1', { scale: 1.7, duration: 0.5, ease: 'elastic.out(1, 0.5)' }, 7.5);
    tl.call(() => showPopup('¡CAMPEÓN!', 'winner champion', 960, 220, 7.8), null, 7.8);
    tl.call(() => showPopup('PLAYER_01', 'winner', 960, 290, 8.1), null, 8.1);
    
    // Final fade
    tl.to('#root', { opacity: 0, duration: 1.5, ease: 'power2.in' }, 9);
    
    window.__timelines['root'] = tl;
  </script>
</body>
</html>
